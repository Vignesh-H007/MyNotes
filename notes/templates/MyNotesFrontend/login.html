<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | MyNotes</title>
    <style>
        body {
            background: #fffdf5;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            background: #ffffff;
            height: 60vh;
            width: 40vw;
            box-shadow: 0 0 10px rgb(0, 0, 0, 0.2);
            margin: 50px auto;
            border-radius: 20px;
            border-bottom: 20px solid #5d4a36;
        }

        #welcomeMsg,
        #subMsg {
            text-align: center;
        }

        #welcomeMsg {
            padding-top: 30px;
            font-size: 1.5rem;
        }

        .btnContainer {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
            text-align: center;
            background: rgb(191, 189, 189, 0.3);
            width: 15rem;
            margin: auto;
            display: flex;
            gap: 20px;
            padding: 9px;
            border-radius: 8px;
        }

        #loginBtn,
        #signUpBtn {
            background: transparent;
            border: none;
            font-size: 1rem;
        }

        #signUpBtn {
            background: #ffffff;
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            color: #4b3621;
        }

        .formContainer {
            margin: 20px;
            text-align: center;
        }

        .formContainer input {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            transition: all ease-in-out 0.3s;
        }

        #userName,
        #password {
            margin-top: 20px;
            border-radius: 18px;
            padding: 8px;
            border: #5d4a36 solid 2px;
        }

        input::placeholder {
            text-align: center;
        }

        .formContainer input:focus {
            outline: none;
        }

        .formContainer button {
            padding: 5px 60px;
            border-radius: 20px;
            margin-top: 50px;
            border: none;
            background: #d2691e;
            color: #ffffff;
            cursor: pointer;
        }

        .helperLinks {
            text-align: center;
            display: flex;
            gap: 27px;
            justify-content: center;
            align-items: center;
            /*margin-top: 70px;*/
        }

        .helperLinks #toLogin {
            color: #4b3621;
            text-decoration: none;
        }

        #forgotPass {
            color: #d2691e;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3 id="welcomeMsg">Hi there!</h3>
        <p id="subMsg">Create your account to get Started</p>
        <div class="btnContainer">
            <button type="button" id="loginBtn">Login</button>
            <button type="button" id="signUpBtn">SignUp</button>
        </div>
        <div class="formContainer">
            <form method="post">
                {% csrf_token %}
                <input type="text" id="userName" name="username" placeholder="Username" required>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <button type="submit" id="submit" name="action" value="signup">Create Account</button>
                {% if error %}
                    <p style="color: red; text-align: center; padding: 0;">{{ error }}</p>
                {% endif %}
            </form>
        </div>
        <div class="helperLinks">
            <a href="#" id="toLogin">Already have an account?</a>
            <a href="#" id="forgotPass">Forgot password?</a>
        </div>
    </div>
    <script>
        const login_button = document.getElementById("loginBtn");
        const signup_button = document.getElementById("signUpBtn");
        const title = document.getElementById("welcomeMsg");
        const sub_msg = document.getElementById("subMsg");
        const submit_button = document.getElementById("submit");
        const userName = document.getElementById("userName");
        const password = document.getElementById("password");

        login_button.onclick = function () {
            login_button.style.background = '#fff';
            login_button.style.padding = '0.375rem 0.75rem';
            login_button.style.borderRadius = "8px";
            signup_button.style.background = 'none';
            title.textContent = "Welcome Back!";
            sub_msg.textContent = "Login to manage your student notes";
            submit_button.textContent = "Login";
            submit_button.value = "login";
            console.log(submit_button.value);
        }

        signup_button.onclick = function () {
            login_button.style.background = 'none';
            signup_button.style.background = '#fff';
            title.textContent = "Hi there!";
            sub_msg.textContent = "Create your account to get Started";
            submit_button.textContent = "Create Account";
            submit_button.value = "signup";
            console.log(submit_button.value);
        }
    </script>
</body>

</html>
